name: Python Continuous Integration

on:
  workflow_call:
    inputs:
      os-matrix:
        description: 'JSON array of runner OSes for the test matrix.'
        type: string
        default: '["ubuntu-22.04", "macos-13", "macos-14", "macos-15"]'
      python-versions:
        description: 'JSON array of Python versions for the test matrix.'
        type: string
        default: '["3.11", "3.12", "3.13", "3.14"]'
      install-command:
        description: 'Install package command. Defaults to pip install .'
        type: string
        default: 'pip install .'
      test-command:
        description: 'Command used to run the test suite (executed inside the venv).'
        type: string
        default: 'py.test -s -vvv tests/ -Werror'

jobs:
  check_skip:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
        - run: echo "skip"

  test:
    needs: ["check_skip"]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJSON(inputs.os-matrix) }}
        python-version: ${{ fromJSON(inputs.python-versions) }}

    steps:
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Create virtual environment
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install -U pip

      - name: Install ${{ github.event.repository.name }}
        run: |
          source .venv/bin/activate
          ${{ inputs.install-command }}

      - name: Run ${{ github.event.repository.name }} test suite
        run: |
          source .venv/bin/activate
          ${{ inputs.test-command }}

      # - name: Debug with tmate on failure
      #   if: ${{ failure() }}
      #   uses: mxschmitt/action-tmate@v3

